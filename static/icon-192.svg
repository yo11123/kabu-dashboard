<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1520"/>
      <stop offset="50%" stop-color="#06090f"/>
      <stop offset="100%" stop-color="#0a1018"/>
    </linearGradient>
    <radialGradient id="goldGlow" cx="75%" cy="25%" r="50%">
      <stop offset="0%" stop-color="#d4af37" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
    </radialGradient>
    <filter id="glowGreen">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowRed">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowDot">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="90" fill="url(#bg)"/>
  <rect width="512" height="512" rx="90" fill="url(#goldGlow)"/>
  <rect x="8" y="8" width="496" height="496" rx="82" fill="none" stroke="#1a1f2e" stroke-width="2"/>

  <line x1="60" y1="130" x2="452" y2="130" stroke="#141a28" stroke-width="1"/>
  <line x1="60" y1="200" x2="452" y2="200" stroke="#141a28" stroke-width="1"/>
  <line x1="60" y1="270" x2="452" y2="270" stroke="#141a28" stroke-width="1"/>
  <line x1="60" y1="340" x2="452" y2="340" stroke="#141a28" stroke-width="1"/>
  <line x1="60" y1="410" x2="452" y2="410" stroke="#141a28" stroke-width="1"/>

  <g filter="url(#glowGreen)" opacity="0.9">
    <line x1="120" y1="150" x2="120" y2="390" stroke="#5ca08b" stroke-width="6" stroke-linecap="round"/>
    <rect x="94" y="220" width="52" height="120" rx="5" fill="#5ca08b"/>
  </g>
  <g filter="url(#glowRed)" opacity="0.9">
    <line x1="210" y1="120" x2="210" y2="370" stroke="#c45c5c" stroke-width="6" stroke-linecap="round"/>
    <rect x="184" y="160" width="52" height="140" rx="5" fill="#c45c5c"/>
  </g>
  <g filter="url(#glowGreen)" opacity="0.95">
    <line x1="300" y1="100" x2="300" y2="350" stroke="#5ca08b" stroke-width="6" stroke-linecap="round"/>
    <rect x="274" y="170" width="52" height="130" rx="5" fill="#5ca08b"/>
  </g>
  <g filter="url(#glowGreen)">
    <line x1="390" y1="90" x2="390" y2="310" stroke="#5ca08b" stroke-width="6" stroke-linecap="round"/>
    <rect x="364" y="130" width="52" height="110" rx="5" fill="#5ca08b"/>
  </g>

  <path d="M96 340 L186 300 L276 240 L390 155" stroke="#d4af37" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.8"/>
  <path d="M96 340 L186 300 L276 240 L390 155 L390 420 L96 420 Z" fill="#d4af37" opacity="0.03"/>
  <circle cx="390" cy="155" r="18" fill="#d4af37" opacity="0.15" filter="url(#glowDot)"/>
  <circle cx="390" cy="155" r="10" fill="#d4af37" opacity="0.9"/>
  <circle cx="386" cy="151" r="3" fill="#fff" opacity="0.5"/>

  <rect x="100" y="415" width="40" height="25" rx="3" fill="#5ca08b" opacity="0.25"/>
  <rect x="190" y="405" width="40" height="35" rx="3" fill="#c45c5c" opacity="0.25"/>
  <rect x="280" y="400" width="40" height="40" rx="3" fill="#5ca08b" opacity="0.3"/>
  <rect x="370" y="395" width="40" height="45" rx="3" fill="#5ca08b" opacity="0.35"/>
</svg>
